syntax = "proto3";

package temporal.api;

option go_package = "go.temporal.io/api;draft";
option java_package = "io.temporal.api";
option java_multiple_files = true;
option java_outer_classname = "DraftProto";
option ruby_package = "Temporalio::Api";
option csharp_namespace = "Temporalio.Api";

import "google/protobuf/descriptor.proto";

// Marks a proto element as draft, owned by the named feature flag.
//
// The stable temporal/api tree is generated from temporal/api_next by removing
// declarations annotated with these options. Draft generators can consume
// temporal/api_next directly to expose opt-in sidecar APIs.
//
// Usage:
//
//   message:    option (temporal.api.draft_message)    = "feature";
//   field:      [(temporal.api.draft_field)            = "feature"]
//   enum:       option (temporal.api.draft_enum)       = "feature";
//   enum value: [(temporal.api.draft_enum_value)       = "feature"]
//   service:    option (temporal.api.draft_service)    = "feature";
//   rpc method: option (temporal.api.draft_method)     = "feature";
extend google.protobuf.MessageOptions   { string draft_message   = 77001; }
extend google.protobuf.FieldOptions     { string draft_field     = 77001; }
extend google.protobuf.EnumOptions      { string draft_enum      = 77001; }
extend google.protobuf.EnumValueOptions { string draft_enum_value = 77001; }
extend google.protobuf.ServiceOptions   { string draft_service   = 77001; }
extend google.protobuf.MethodOptions    { string draft_method    = 77001; }
