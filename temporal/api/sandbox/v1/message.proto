syntax = "proto3";

package temporal.api.sandbox.v1;

option go_package = "go.temporal.io/api/sandbox/v1;sandbox";
option java_package = "io.temporal.api.sandbox.v1";
option java_multiple_files = true;
option java_outer_classname = "MessageProto";
option ruby_package = "Temporalio::Api::Sandbox::V1";
option csharp_namespace = "Temporalio.Api.Sandbox.V1";

// SandboxOptions configures an isolated sandbox environment for activity execution.
// When set on an activity, the worker creates a sandbox with the workspace
// bind-mounted at /data. All commands executed via activity.GetSandbox(ctx)
// run inside this sandbox.
message SandboxOptions {
    // The rootfs template for the sandbox (e.g. "python-3.12", "node-22").
    // Templates provide language runtimes and tools. If empty, a minimal
    // default rootfs is used.
    string template_id = 1;
    // Per-sandbox resource constraints enforced via cgroups.
    SandboxResourceLimits resource_limits = 2;
    // Controls outbound network access from the sandbox.
    SandboxNetworkPolicy network_policy = 3;
}

// SandboxResourceLimits sets per-sandbox resource constraints.
message SandboxResourceLimits {
    // CPU limit as a fraction of cores (e.g. 0.5 = half a core).
    // Zero uses the default (1.0).
    double cpus = 1;
    // Memory limit in megabytes. Zero uses the default (512).
    int64 memory_mb = 2;
    // I/O operations per second on the workspace device.
    // Zero means no I/O limit.
    int64 disk_iops = 3;
    // Maximum number of concurrent processes inside the sandbox.
    // Zero uses the default (256).
    int64 max_pids = 4;
    // Disk space limit in megabytes for workspace writes (upper layer).
    // Zero means no limit (unlimited). Positive values set the cap.
    int64 disk_mb = 5;
}

// SandboxNetworkPolicy controls outbound network access from the sandbox.
// The sandbox has no direct network access. A host-side proxy enforces the
// allowlist, with DNS resolution on the host side.
message SandboxNetworkPolicy {
    // Host:port pairs the sandbox may connect to.
    // An empty list means no outbound network access.
    repeated HostPort allowed_hosts = 1;
}

// HostPort is a host:port pair for network allowlist entries.
message HostPort {
    string host = 1;
    int32 port = 2;
}
