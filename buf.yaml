version: v1
name: buf.build/temporalio/api
deps:
  - buf.build/grpc-ecosystem/grpc-gateway
  - buf.build/googleapis/googleapis
build:
  excludes:
    # Buf won't accept a local dependency on the google protos but we need them
    # to run api-linter, so just tell buf it ignore it
    - google
    # Authored stable+draft source. temporal/api is generated from this
    # and remains the default public tree consumed by SDKs.
    - temporal/api_next
breaking:
  use:
    - WIRE_JSON
  ignore:
    - google
    - temporal/api_next
lint:
  use:
    - DEFAULT
  ignore:
    - google
    - temporal/api_next
