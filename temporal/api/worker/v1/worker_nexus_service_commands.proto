syntax = "proto3";

package temporal.api.worker.v1;

option go_package = "go.temporal.io/api/worker/v1;worker";
option java_package = "io.temporal.api.worker.v1";
option java_multiple_files = true;
option java_outer_classname = "WorkerNexusServiceCommandsProto";
option ruby_package = "Temporalio::Api::Worker::V1";
option csharp_namespace = "Temporalio.Api.Worker.V1";

// (--
// Internal Nexus service for server-to-worker communication.
// See worker_service.nexusrpc.yaml for the service definition.
// --)

// Request payload for the "execute-commands" Nexus operation.
message WorkerCommandsRequest {
    repeated WorkerCommand commands = 1;

    message WorkerCommand {
        oneof type {
            CancelActivity cancel_activity = 1;
        }
    }

    message CancelActivity {
        bytes task_token = 1;
    }
}

// Response payload for the "execute-commands" Nexus operation.
message WorkerCommandsResponse {
    repeated WorkerCommandResult results = 1;

    message WorkerCommandResult {
        oneof type {
            CancelActivityResult cancel_activity = 1;
        }
    }

    message CancelActivityResult {
    }
}

