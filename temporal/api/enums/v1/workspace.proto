syntax = "proto3";

package temporal.api.enums.v1;

option go_package = "go.temporal.io/api/enums/v1;enums";
option java_package = "io.temporal.api.enums.v1";
option java_multiple_files = true;
option java_outer_classname = "WorkspaceProto";
option ruby_package = "Temporalio::Api::Enums::V1";
option csharp_namespace = "Temporalio.Api.Enums.V1";

// WorkspaceAccessMode controls how an activity accesses a workspace within a
// single workflow execution.
enum WorkspaceAccessMode {
    // Default value. Treated as READ_WRITE.
    WORKSPACE_ACCESS_MODE_UNSPECIFIED = 0;
    // Exclusive read-write access. No other activity can access the workspace
    // while a READ_WRITE activity is scheduled or running. The worker commits
    // changes on activity completion.
    WORKSPACE_ACCESS_MODE_READ_WRITE = 1;
    // Shared read-only access. Multiple READ_ONLY activities can run
    // concurrently on the same workspace. The worker discards any filesystem
    // writes on activity completion (no commit).
    WORKSPACE_ACCESS_MODE_READ_ONLY = 2;
}

// WorkspaceTransferMode controls how a workspace is passed to a child workflow.
enum WorkspaceTransferMode {
    WORKSPACE_TRANSFER_MODE_UNSPECIFIED = 0;
    // Handoff: Transfer write access to the child. The parent loses write
    // access until the child completes. When the child completes, the parent
    // can re-acquire write access and sees the child's changes.
    WORKSPACE_TRANSFER_MODE_HANDOFF = 1;
    // Fork: Create an independent copy of the workspace at the current version.
    // The child gets a new workspace with its own version chain. The parent and
    // child diverge — changes on either side do not affect the other.
    WORKSPACE_TRANSFER_MODE_FORK = 2;
}
