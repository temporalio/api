syntax = "proto3";

package temporal.nexus.api.workflowservice.v1;

option go_package = "go.temporal.io/nexus/api/workflowservice/v1;workflowservice";
option java_package = "io.temporal.nexus.api.workflowservice.v1";
option java_multiple_files = true;
option java_outer_classname = "RequestResponseProto";
option ruby_package = "Temporalio::Nexus::Api::WorkflowService::V1";
option csharp_namespace = "Temporalio.Nexus.Api.WorkflowService.V1";

import "temporal/api/enums/v1/workflow.proto";
import "temporal/api/common/v1/message.proto";
import "temporal/api/failure/v1/message.proto";

message WaitForExternalWorkflowRequest {
    string namespace = 1;
    // The workflow execution to wait for.
    temporal.api.common.v1.WorkflowExecution execution = 2;
    string identity = 3;
}

message WaitForExternalWorkflowResponse {
	temporal.api.enums.v1.WorkflowExecutionStatus status = 1;

    oneof completion_status {
        temporal.api.common.v1.Payload result = 2;
        temporal.api.failure.v1.Failure failure = 3;
    }
}
