nexusrpc: 1.0.0
types:
  Deployment:
    type: object
    properties:
      seriesName:
        type: string
      buildId:
        type: string
  Header:
    type: object
    properties:
      fields:
        type: object
        additionalProperties:
          $ref: '#/types/Payload'
  Link:
    type: object
    properties:
      workflowEvent:
        $ref: '#/types/Link_WorkflowEvent'
      batchJob:
        $ref: '#/types/Link_BatchJob'
      activity:
        $ref: '#/types/Link_Activity'
  Link_Activity:
    type: object
    properties:
      namespace:
        type: string
      activityId:
        type: string
      runId:
        type: string
  Link_BatchJob:
    type: object
    properties:
      jobId:
        type: string
  Link_WorkflowEvent:
    type: object
    properties:
      namespace:
        type: string
      workflowId:
        type: string
      runId:
        type: string
      eventRef:
        $ref: '#/types/WorkflowEvent_EventReference'
      requestIdRef:
        $ref: '#/types/WorkflowEvent_RequestIdReference'
  Memo:
    type: object
    properties:
      fields:
        type: object
        additionalProperties:
          $ref: '#/types/Payload'
  Payload:
    type: object
    properties:
      metadata:
        type: object
        additionalProperties:
          type: string
          format: byte
      data:
        type: string
        format: byte
      externalPayloads:
        type: array
        items:
          $ref: '#/types/Payload_ExternalPayloadDetails'
  Payload_ExternalPayloadDetails:
    type: object
    properties:
      sizeBytes:
        type: string
  Payloads:
    type: object
    properties:
      payloads:
        type: array
        items:
          $ref: '#/types/Payload'
  Priority:
    type: object
    properties:
      priorityKey:
        type: integer
        format: int32
      fairnessKey:
        type: string
      fairnessWeight:
        type: number
        format: float
  RetryPolicy:
    type: object
    properties:
      initialInterval:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      backoffCoefficient:
        type: number
        format: double
      maximumInterval:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      maximumAttempts:
        type: integer
        format: int32
      nonRetryableErrorTypes:
        type: array
        items:
          type: string
  SearchAttributes:
    type: object
    properties:
      indexedFields:
        type: object
        additionalProperties:
          $ref: '#/types/Payload'
  SignalWithStartWorkflowExecutionRequest:
    $dotnetProtoRef: Temporalio.Api.WorkflowService.V1.SignalWithStartWorkflowExecutionRequest
    $goProtoRef: go.temporal.io/api/workflowservice/v1.SignalWithStartWorkflowExecutionRequest
    $javaProtoRef: io.temporal.api.workflowservice.v1.SignalWithStartWorkflowExecutionRequest
    $pythonProtoRef: temporalio.api.workflowservice.v1.SignalWithStartWorkflowExecutionRequest
    $rubyProtoRef: Temporalio::Api::WorkflowService::V1::SignalWithStartWorkflowExecutionRequest
    $typescriptProtoRef: '@temporalio/api/workflowservice/v1.SignalWithStartWorkflowExecutionRequest'
    type: object
    properties:
      namespace:
        type: string
      workflowId:
        type: string
      workflowType:
        $ref: '#/types/WorkflowType'
      taskQueue:
        $ref: '#/types/TaskQueue'
      input:
        $ref: '#/types/Payloads'
      workflowExecutionTimeout:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      workflowRunTimeout:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      workflowTaskTimeout:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      identity:
        type: string
      requestId:
        type: string
      workflowIdReusePolicy:
        enum:
          - WORKFLOW_ID_REUSE_POLICY_UNSPECIFIED
          - WORKFLOW_ID_REUSE_POLICY_ALLOW_DUPLICATE
          - WORKFLOW_ID_REUSE_POLICY_ALLOW_DUPLICATE_FAILED_ONLY
          - WORKFLOW_ID_REUSE_POLICY_REJECT_DUPLICATE
          - WORKFLOW_ID_REUSE_POLICY_TERMINATE_IF_RUNNING
        type: string
        format: enum
      workflowIdConflictPolicy:
        enum:
          - WORKFLOW_ID_CONFLICT_POLICY_UNSPECIFIED
          - WORKFLOW_ID_CONFLICT_POLICY_FAIL
          - WORKFLOW_ID_CONFLICT_POLICY_USE_EXISTING
          - WORKFLOW_ID_CONFLICT_POLICY_TERMINATE_EXISTING
        type: string
        format: enum
      signalName:
        type: string
      signalInput:
        $ref: '#/types/Payloads'
      control:
        type: string
      retryPolicy:
        $ref: '#/types/RetryPolicy'
      cronSchedule:
        type: string
      memo:
        $ref: '#/types/Memo'
      searchAttributes:
        $ref: '#/types/SearchAttributes'
      header:
        $ref: '#/types/Header'
      workflowStartDelay:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      userMetadata:
        $ref: '#/types/UserMetadata'
      links:
        type: array
        items:
          $ref: '#/types/Link'
      versioningOverride:
        $ref: '#/types/VersioningOverride'
      priority:
        $ref: '#/types/Priority'
      timeSkippingConfig:
        $ref: '#/types/TimeSkippingConfig'
  SignalWithStartWorkflowExecutionResponse:
    $dotnetProtoRef: Temporalio.Api.WorkflowService.V1.SignalWithStartWorkflowExecutionResponse
    $goProtoRef: go.temporal.io/api/workflowservice/v1.SignalWithStartWorkflowExecutionResponse
    $javaProtoRef: io.temporal.api.workflowservice.v1.SignalWithStartWorkflowExecutionResponse
    $pythonProtoRef: temporalio.api.workflowservice.v1.SignalWithStartWorkflowExecutionResponse
    $rubyProtoRef: Temporalio::Api::WorkflowService::V1::SignalWithStartWorkflowExecutionResponse
    $typescriptProtoRef: '@temporalio/api/workflowservice/v1.SignalWithStartWorkflowExecutionResponse'
    type: object
    properties:
      runId:
        type: string
      started:
        type: boolean
      signalLink:
        $ref: '#/types/Link'
  TaskQueue:
    type: object
    properties:
      name:
        type: string
      kind:
        enum:
          - TASK_QUEUE_KIND_UNSPECIFIED
          - TASK_QUEUE_KIND_NORMAL
          - TASK_QUEUE_KIND_STICKY
          - TASK_QUEUE_KIND_WORKER_COMMANDS
        type: string
        format: enum
      normalName:
        type: string
  TimeSkippingConfig:
    type: object
    properties:
      enabled:
        type: boolean
      disablePropagation:
        type: boolean
      maxSkippedDuration:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      maxElapsedDuration:
        type: string
        pattern: ^-?(?:0|[1-9][0-9]{0,11})(?:\.[0-9]{1,9})?s$
      maxTargetTime:
        type: string
        format: date-time
  UserMetadata:
    type: object
    properties:
      summary:
        $ref: '#/types/Payload'
      details:
        $ref: '#/types/Payload'
  VersioningOverride:
    type: object
    properties:
      pinned:
        $ref: '#/types/VersioningOverride_PinnedOverride'
      autoUpgrade:
        type: boolean
      behavior:
        enum:
          - VERSIONING_BEHAVIOR_UNSPECIFIED
          - VERSIONING_BEHAVIOR_PINNED
          - VERSIONING_BEHAVIOR_AUTO_UPGRADE
        type: string
        format: enum
      deployment:
        $ref: '#/types/Deployment'
      pinnedVersion:
        type: string
  VersioningOverride_PinnedOverride:
    type: object
    properties:
      behavior:
        enum:
          - PINNED_OVERRIDE_BEHAVIOR_UNSPECIFIED
          - PINNED_OVERRIDE_BEHAVIOR_PINNED
        type: string
        format: enum
      version:
        $ref: '#/types/WorkerDeploymentVersion'
  WorkerDeploymentVersion:
    type: object
    properties:
      buildId:
        type: string
      deploymentName:
        type: string
  WorkflowEvent_EventReference:
    type: object
    properties:
      eventId:
        type: string
      eventType:
        enum:
          - EVENT_TYPE_UNSPECIFIED
          - EVENT_TYPE_WORKFLOW_EXECUTION_STARTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_COMPLETED
          - EVENT_TYPE_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_WORKFLOW_EXECUTION_TIMED_OUT
          - EVENT_TYPE_WORKFLOW_TASK_SCHEDULED
          - EVENT_TYPE_WORKFLOW_TASK_STARTED
          - EVENT_TYPE_WORKFLOW_TASK_COMPLETED
          - EVENT_TYPE_WORKFLOW_TASK_TIMED_OUT
          - EVENT_TYPE_WORKFLOW_TASK_FAILED
          - EVENT_TYPE_ACTIVITY_TASK_SCHEDULED
          - EVENT_TYPE_ACTIVITY_TASK_STARTED
          - EVENT_TYPE_ACTIVITY_TASK_COMPLETED
          - EVENT_TYPE_ACTIVITY_TASK_FAILED
          - EVENT_TYPE_ACTIVITY_TASK_TIMED_OUT
          - EVENT_TYPE_ACTIVITY_TASK_CANCEL_REQUESTED
          - EVENT_TYPE_ACTIVITY_TASK_CANCELED
          - EVENT_TYPE_TIMER_STARTED
          - EVENT_TYPE_TIMER_FIRED
          - EVENT_TYPE_TIMER_CANCELED
          - EVENT_TYPE_WORKFLOW_EXECUTION_CANCEL_REQUESTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_CANCELED
          - EVENT_TYPE_REQUEST_CANCEL_EXTERNAL_WORKFLOW_EXECUTION_INITIATED
          - EVENT_TYPE_REQUEST_CANCEL_EXTERNAL_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_EXTERNAL_WORKFLOW_EXECUTION_CANCEL_REQUESTED
          - EVENT_TYPE_MARKER_RECORDED
          - EVENT_TYPE_WORKFLOW_EXECUTION_SIGNALED
          - EVENT_TYPE_WORKFLOW_EXECUTION_TERMINATED
          - EVENT_TYPE_WORKFLOW_EXECUTION_CONTINUED_AS_NEW
          - EVENT_TYPE_START_CHILD_WORKFLOW_EXECUTION_INITIATED
          - EVENT_TYPE_START_CHILD_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_STARTED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_COMPLETED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_CANCELED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_TIMED_OUT
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_TERMINATED
          - EVENT_TYPE_SIGNAL_EXTERNAL_WORKFLOW_EXECUTION_INITIATED
          - EVENT_TYPE_SIGNAL_EXTERNAL_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_EXTERNAL_WORKFLOW_EXECUTION_SIGNALED
          - EVENT_TYPE_UPSERT_WORKFLOW_SEARCH_ATTRIBUTES
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_ADMITTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_ACCEPTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_REJECTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_COMPLETED
          - EVENT_TYPE_WORKFLOW_PROPERTIES_MODIFIED_EXTERNALLY
          - EVENT_TYPE_ACTIVITY_PROPERTIES_MODIFIED_EXTERNALLY
          - EVENT_TYPE_WORKFLOW_PROPERTIES_MODIFIED
          - EVENT_TYPE_NEXUS_OPERATION_SCHEDULED
          - EVENT_TYPE_NEXUS_OPERATION_STARTED
          - EVENT_TYPE_NEXUS_OPERATION_COMPLETED
          - EVENT_TYPE_NEXUS_OPERATION_FAILED
          - EVENT_TYPE_NEXUS_OPERATION_CANCELED
          - EVENT_TYPE_NEXUS_OPERATION_TIMED_OUT
          - EVENT_TYPE_NEXUS_OPERATION_CANCEL_REQUESTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_OPTIONS_UPDATED
          - EVENT_TYPE_NEXUS_OPERATION_CANCEL_REQUEST_COMPLETED
          - EVENT_TYPE_NEXUS_OPERATION_CANCEL_REQUEST_FAILED
          - EVENT_TYPE_WORKFLOW_EXECUTION_PAUSED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UNPAUSED
          - EVENT_TYPE_WORKFLOW_EXECUTION_TIME_SKIPPING_TRANSITIONED
        type: string
        format: enum
  WorkflowEvent_RequestIdReference:
    type: object
    properties:
      requestId:
        type: string
      eventType:
        enum:
          - EVENT_TYPE_UNSPECIFIED
          - EVENT_TYPE_WORKFLOW_EXECUTION_STARTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_COMPLETED
          - EVENT_TYPE_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_WORKFLOW_EXECUTION_TIMED_OUT
          - EVENT_TYPE_WORKFLOW_TASK_SCHEDULED
          - EVENT_TYPE_WORKFLOW_TASK_STARTED
          - EVENT_TYPE_WORKFLOW_TASK_COMPLETED
          - EVENT_TYPE_WORKFLOW_TASK_TIMED_OUT
          - EVENT_TYPE_WORKFLOW_TASK_FAILED
          - EVENT_TYPE_ACTIVITY_TASK_SCHEDULED
          - EVENT_TYPE_ACTIVITY_TASK_STARTED
          - EVENT_TYPE_ACTIVITY_TASK_COMPLETED
          - EVENT_TYPE_ACTIVITY_TASK_FAILED
          - EVENT_TYPE_ACTIVITY_TASK_TIMED_OUT
          - EVENT_TYPE_ACTIVITY_TASK_CANCEL_REQUESTED
          - EVENT_TYPE_ACTIVITY_TASK_CANCELED
          - EVENT_TYPE_TIMER_STARTED
          - EVENT_TYPE_TIMER_FIRED
          - EVENT_TYPE_TIMER_CANCELED
          - EVENT_TYPE_WORKFLOW_EXECUTION_CANCEL_REQUESTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_CANCELED
          - EVENT_TYPE_REQUEST_CANCEL_EXTERNAL_WORKFLOW_EXECUTION_INITIATED
          - EVENT_TYPE_REQUEST_CANCEL_EXTERNAL_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_EXTERNAL_WORKFLOW_EXECUTION_CANCEL_REQUESTED
          - EVENT_TYPE_MARKER_RECORDED
          - EVENT_TYPE_WORKFLOW_EXECUTION_SIGNALED
          - EVENT_TYPE_WORKFLOW_EXECUTION_TERMINATED
          - EVENT_TYPE_WORKFLOW_EXECUTION_CONTINUED_AS_NEW
          - EVENT_TYPE_START_CHILD_WORKFLOW_EXECUTION_INITIATED
          - EVENT_TYPE_START_CHILD_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_STARTED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_COMPLETED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_CANCELED
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_TIMED_OUT
          - EVENT_TYPE_CHILD_WORKFLOW_EXECUTION_TERMINATED
          - EVENT_TYPE_SIGNAL_EXTERNAL_WORKFLOW_EXECUTION_INITIATED
          - EVENT_TYPE_SIGNAL_EXTERNAL_WORKFLOW_EXECUTION_FAILED
          - EVENT_TYPE_EXTERNAL_WORKFLOW_EXECUTION_SIGNALED
          - EVENT_TYPE_UPSERT_WORKFLOW_SEARCH_ATTRIBUTES
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_ADMITTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_ACCEPTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_REJECTED
          - EVENT_TYPE_WORKFLOW_EXECUTION_UPDATE_COMPLETED
          - EVENT_TYPE_WORKFLOW_PROPERTIES_MODIFIED_EXTERNALLY
          - EVENT_TYPE_ACTIVITY_PROPERTIES_MODIFIED_EXTERNALLY
          - EVENT_TYPE_WORKFLOW_PROPERTIES_MODIFIED
          - EVENT_TYPE_NEXUS_OPERATION_SCHEDULED
          - EVENT_TYPE_NEXUS_OPERATION_STARTED
          - EVENT_TYPE_NEXUS_OPERATION_COMPLETED
