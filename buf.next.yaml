version: v1
name: buf.build/temporalio/api-next
deps:
  - buf.build/grpc-ecosystem/grpc-gateway
  - buf.build/googleapis/googleapis
build:
  excludes:
    - google
    - temporal/api
breaking:
  use:
    - WIRE_JSON
  ignore:
    - google
    - temporal/api
lint:
  use:
    - DEFAULT
  except:
    - PACKAGE_DIRECTORY_MATCH
  ignore:
    - google
    - temporal/api
    - temporal/api_next/draft.proto
