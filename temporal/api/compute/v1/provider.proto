syntax = "proto3";

package temporal.api.compute.v1;

option go_package = "go.temporal.io/api/compute/v1;compute";
option java_package = "io.temporal.api.compute.v1";
option java_multiple_files = true;
option java_outer_classname = "ProviderProto";
option ruby_package = "Temporalio::Api::Compute::V1";
option csharp_namespace = "Temporalio.Api.Compute.V1";

import "google/protobuf/any.proto";
import "temporal/api/common/v1/message.proto";

// Provider stores information used by a worker control plane controller
// to respond to worker lifecycle events. For example, when a Task is received
// on a TaskQueue that has no active pollers in the last five minutes, a
// serverless worker lifecycle controller might need to invoke an AWS Lambda
// Function that itself ends up calling the SDK's worker.New() function.
message Provider {
    // Type of the compute provider. This string is implementation-specific and
    // can be used by implementations to understand how to interpret the
    // contents of the provider_details field.
    string type = 1;
    // Contains provider-specific instructions and configuration.
    oneof detail {
        // will be an unencrypted, unencoded object of provider-specific
        // information
        // (-- api-linter: core::0146::any=disabled
        //     aip.dev/not-precedent: This needs to be extensible to
        //     externally-written compute providers --)
        google.protobuf.Any detail_object = 2;
        // will be an encrypted, encoded bytestring containing
        // provider-specific information. The implementation must understand
        // how to decrypt the payload.
        temporal.api.common.v1.Payload detail_payload = 3;
    }
}

// ProviderDetailAWSLambda stores configuration information for Workers
// that use the AWS Lambda serverless compute platform.
//
// Workers that use AWS Lambda have their lifecycle managed by the Temporal
// Server. When a WorkerDeployment has its compute_config.provider set to use
// the AWS Lambda compute provider, the Temporal Server will invoke an AWS
// Lambda Function via its ARN. This will start the Worker that is housed
// within that AWS Lambda Function and the Worker will begin listening to Tasks
// on the WorkerDeployment's configured TaskQueue.
message ProviderDetailAWSLambda {
    // A Qualified or Unqualified Lambda Function ARN of the AWS Lambda
    // Function to be invoked.
    string invoke_arn = 1;
    // Optional AWS IAM Role ARN that will need to be assumed by the Temporal
    // Server to invoke the Lambda Function.
    string iam_role = 10;
}
