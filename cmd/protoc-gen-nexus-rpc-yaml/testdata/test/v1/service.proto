syntax = "proto3";

package test.v1;

import "nexusannotations/v1/options.proto";

option go_package = "example.com/api/test/v1;testv1";
option java_package = "com.example.api.test.v1";
option ruby_package = "Example::Api::Test::V1";
option csharp_namespace = "Example.Api.Test.V1";

service TestService {
  rpc DoThing(DoThingRequest) returns (DoThingResponse) {
    option (nexusannotations.v1.operation) = {
      tags: "exposed"
    };
  }
}

message DoThingRequest {}
message DoThingResponse {}
