syntax = "proto3";

package temporal.api.applicationservice.v1;

option go_package = "go.temporal.io/api/applicationservice/v1;applicationservice";
option java_package = "io.temporal.api.applicationservice.v1";
option java_multiple_files = true;
option java_outer_classname = "RequestResponseProto";
option ruby_package = "Temporalio::Api::Applicationservice::V1";
option csharp_namespace = "Temporalio.Api.Applicationservice.V1";

import "temporal/api/enums/v1/workflow.proto";
import "temporal/api/common/v1/message.proto";
import "temporal/api/failure/v1/message.proto";

// (-- api-linter: core::0131::request-name-required=disabled --)
// (-- api-linter: core::0131::request-unknown-fields=disabled --)
message GetWorkflowExecutionResultRequest {
    string namespace = 1;
    // The workflow execution to wait for.
    temporal.api.common.v1.WorkflowExecution execution = 2;
}


message GetWorkflowExecutionResultResponse {
    // The status of the workflow execution being waited on. This is needed to determine whether the workflow completed successfully or failed.
    temporal.api.enums.v1.WorkflowExecutionStatus status = 1;

    // If the workflow execution being waited on completed successfully, the result will be set. If it failed, the failure will be set.
    // If the workflow execution is still running, neither field will be set.
    oneof completion_status {
        temporal.api.common.v1.Payload  result  = 2;
        temporal.api.failure.v1.Failure failure = 3;
    }
}
